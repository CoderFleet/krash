syntax = "proto3";

package chat;

option java_multiple_files = true;
option java_package = "com.rudransh.krash.chat";

service ChatService {
  rpc SendMessage(ChatMessage) returns (Empty);
  rpc StreamMessages(User) returns (stream ChatMessage);
}

message ChatMessage {
  string sender = 1;
  string content = 2;
  int64 timestamp = 3;
  string roomId = 4;
}

message User {
  string username = 1;
  string roomId = 2;
}

message Empty {}